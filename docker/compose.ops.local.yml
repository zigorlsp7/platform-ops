name: platform-ops-local

services:
  jaeger:
    image: jaegertracing/all-in-one:1.53
    restart: unless-stopped
    networks: [ops_shared]

  otel-collector:
    image: otel/opentelemetry-collector:0.98.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./otel/config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4319:4317"
      - "4320:4318"
    depends_on:
      - jaeger
    networks: [ops_shared]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager/config.local.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [ops_shared]

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/config.local.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/prometheus.rules.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/prometheus.alerts.yml:ro
    depends_on:
      - alertmanager
    networks: [ops_shared]

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ops-local-grafana-data:/var/lib/grafana
      - ../docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks: [ops_shared]

  loki:
    image: grafana/loki:2.9.8
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ../docker/loki/config.yml:/etc/loki/config.yml:ro
      - ops-local-loki-data:/loki
    networks: [ops_shared]

  tolgee:
    image: tolgee/tolgee:v3.141.1
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      spring.config.additional-location: file:///config.yaml
      TOLGEE_AUTHENTICATION_ENABLED: true
      TOLGEE_AUTHENTICATION_REGISTRATIONS_ALLOWED: false
      TOLGEE_INITIAL_USERNAME: ${TOLGEE_INITIAL_USERNAME:?TOLGEE_INITIAL_USERNAME is required}
      TOLGEE_INITIAL_PASSWORD: ${TOLGEE_INITIAL_PASSWORD:?TOLGEE_INITIAL_PASSWORD is required}
      TOLGEE_JWT_SECRET: ${TOLGEE_JWT_SECRET:?TOLGEE_JWT_SECRET is required}
    volumes:
      - ops-local-tolgee-data:/data
      - ./tolgee/config.yaml:/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || wget -qO- http://localhost:8080/api/healthz >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [ops_shared]

  openbao:
    image: openbao/openbao:2.5.0
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    command: ["server", "-config=/etc/openbao/prod.hcl"]
    ports:
      - "8200:8200"
    volumes:
      - ../docker/openbao/prod.hcl:/etc/openbao/prod.hcl:ro
      - ops-local-openbao-data:/openbao/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8200/v1/sys/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [ops_shared]

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.10
    restart: unless-stopped
    command:
      [
        "redpanda",
        "start",
        "--overprovisioned",
        "--smp",
        "1",
        "--memory",
        "1G",
        "--reserve-memory",
        "0M",
        "--check=false",
        "--node-id",
        "0",
        "--kafka-addr",
        "INTERNAL://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092",
        "--advertise-kafka-addr",
        "INTERNAL://platform-redpanda:9092,OUTSIDE://localhost:19092",
        "--set",
        "redpanda.auto_create_topics_enabled=true"
      ]
    ports:
      - "19092:19092"
      - "19644:9644"
    volumes:
      - ops-local-redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rpk cluster health | grep -Eq 'Healthy:[[:space:]]+true'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      ops_shared:
        aliases:
          - platform-redpanda

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.1
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: platform-redpanda:9092
    ports:
      - "18081:8080"
    networks: [ops_shared]

networks:
  ops_shared:
    name: platform_ops_shared
    external: true

volumes:
  ops-local-grafana-data:
  ops-local-loki-data:
  ops-local-tolgee-data:
  ops-local-openbao-data:
  ops-local-redpanda-data:
