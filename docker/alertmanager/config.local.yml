global:
  resolve_timeout: 5m

route:
  receiver: local-webhook
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="page"
      receiver: local-webhook

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://host.docker.internal:5001/alerts
        send_resolved: true
