groups:
  - name: cv_api_alerts
    rules:
      - alert: CvApiHighErrorRate
        expr: cv_api:http_error_ratio:rate5m > 0.02
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "cv-api error rate > 2% (5m)"
          description: "The API is returning too many 5xx responses over the last 5 minutes."
          runbook_url: "https://github.com/zigorlsp7/cv-web/blob/main/docs/runbooks/api-high-error-rate.md"

      - alert: CvApiHighLatencyP95
        expr: cv_api:http_p95_seconds:5m > 0.3
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "cv-api p95 latency > 300ms (5m)"
          description: "The API p95 latency is above target over the last 5 minutes."
          runbook_url: "https://github.com/zigorlsp7/cv-web/blob/main/docs/runbooks/api-high-latency.md"
