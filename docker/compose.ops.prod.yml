name: platform-ops-prod

services:
  jaeger:
    image: jaegertracing/all-in-one:1.53
    restart: unless-stopped
    networks: [ops_shared]

  otel-collector:
    image: otel/opentelemetry-collector:0.98.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./otel/config.yml:/etc/otelcol/config.yml:ro
    depends_on:
      - jaeger
    networks: [ops_shared]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager/config.prod.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [ops_shared]

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/config.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/prometheus.rules.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/prometheus.alerts.yml:ro
      - ops-prod-prometheus-data:/prometheus
    depends_on:
      - alertmanager
    networks: [ops_shared]

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ops-prod-grafana-data:/var/lib/grafana
      - ../docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks: [ops_shared]

  loki:
    image: grafana/loki:2.9.8
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ../docker/loki/config.yml:/etc/loki/config.yml:ro
      - ops-prod-loki-data:/loki
    networks: [ops_shared]

  tolgee:
    image: tolgee/tolgee:v3.141.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      spring.config.additional-location: file:///config.yaml
      TOLGEE_AUTHENTICATION_ENABLED: true
      TOLGEE_AUTHENTICATION_REGISTRATIONS_ALLOWED: false
      TOLGEE_INITIAL_USERNAME: ${TOLGEE_INITIAL_USERNAME:?TOLGEE_INITIAL_USERNAME is required}
      TOLGEE_INITIAL_PASSWORD: ${TOLGEE_INITIAL_PASSWORD:?TOLGEE_INITIAL_PASSWORD is required}
      TOLGEE_JWT_SECRET: ${TOLGEE_JWT_SECRET:?TOLGEE_JWT_SECRET is required}
    volumes:
      - ops-prod-tolgee-data:/data
      - ./tolgee/config.yaml:/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || wget -qO- http://localhost:8080/api/healthz >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [ops_shared]

  openbao:
    image: openbao/openbao:2.5.0
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    command: ["server", "-config=/openbao/config/prod.hcl"]
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - ../docker/openbao/prod.hcl:/openbao/config/prod.hcl:ro
      - ops-prod-openbao-data:/openbao/data
    networks: [ops_shared]

networks:
  ops_shared:
    name: platform_ops_shared
    external: true

volumes:
  ops-prod-prometheus-data:
  ops-prod-grafana-data:
  ops-prod-loki-data:
  ops-prod-tolgee-data:
  ops-prod-openbao-data:
