global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "cv-api"
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets: ["api.example.com"]

rule_files:
  - /etc/prometheus/prometheus.rules.yml
  - /etc/prometheus/prometheus.alerts.yml
