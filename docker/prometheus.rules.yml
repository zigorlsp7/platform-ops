groups:
  - name: platform_api_http
    rules:
      - record: platform_api:http_rps:rate30s
        expr: sum(rate(http_requests_total[30s]))

      - record: platform_api:http_error_ratio:rate5m
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_requests_total[5m])), 1)

      - record: platform_api:http_p95_seconds:5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
          )