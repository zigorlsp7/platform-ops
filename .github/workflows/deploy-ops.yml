name: Deploy AWS Ops (EC2 Compose)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: true
        default: main
        type: string
      release_tag:
        description: "Optional release tag label for this ops bundle (manual dispatch only; defaults to ops-<run_number>-<run_attempt>)"
        required: false
        type: string
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-prod
  cancel-in-progress: false

jobs:
  package-bundle:
    if: >-
      github.event_name != 'push' ||
      startsWith(github.event.head_commit.message, 'chore(main): release ')
    name: Package + Upload Ops Bundle
    runs-on: ubuntu-latest
    environment: production

    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Resolve ops release tag
        id: meta
        run: |
          raw_tag="${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}"

          if [ -z "$raw_tag" ] && [ "${{ github.event_name }}" = "push" ]; then
            msg='${{ github.event.head_commit.message }}'
            version="$(printf '%s' "$msg" | sed -nE 's/^chore\(main\): release ([0-9]+\.[0-9]+\.[0-9]+).*$/\1/p')"
            if [ -n "$version" ]; then
              raw_tag="v${version}"
            fi
          fi

          if [ -z "$raw_tag" ]; then
            raw_tag="ops-${{ github.run_number }}-${{ github.run_attempt }}"
          fi

          safe_tag="$(printf '%s' "$raw_tag" | tr '/:@ ' '-' | tr -cd '[:alnum:]._-')"

          if [ -z "$safe_tag" ]; then
            echo "Release tag '$raw_tag' became empty after sanitization" >&2
            exit 1
          fi

          echo "release_tag=$raw_tag" >> "$GITHUB_OUTPUT"
          echo "image_tag=$safe_tag" >> "$GITHUB_OUTPUT"

      - name: Validate required deploy variables
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_DEPLOY_BUCKET: ${{ vars.AWS_DEPLOY_BUCKET }}
          AWS_DEPLOY_INSTANCE_ID: ${{ vars.AWS_DEPLOY_INSTANCE_ID }}
          AWS_SSM_OPS_PREFIX: ${{ vars.AWS_SSM_OPS_PREFIX }}
        run: |
          required=(
            AWS_REGION
            AWS_DEPLOY_BUCKET
            AWS_DEPLOY_INSTANCE_ID
            AWS_SSM_OPS_PREFIX
          )

          for name in "${required[@]}"; do
            if printenv "$name" >/dev/null; then
              value="$(printenv "$name")"
            else
              value=""
            fi
            if [ -z "$value" ]; then
              echo "Missing GitHub environment variable: $name" >&2
              exit 1
            fi
          done

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Package tracked files into deploy bundle
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          mkdir -p artifacts
          git archive --format=tar.gz --output "artifacts/deploy-bundle-${IMAGE_TAG}.tar.gz" HEAD

      - name: Upload deploy bundle to S3
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          DEPLOY_BUCKET: ${{ vars.AWS_DEPLOY_BUCKET }}
        run: |
          aws s3 cp \
            "artifacts/deploy-bundle-${IMAGE_TAG}.tar.gz" \
            "s3://${DEPLOY_BUCKET}/releases/${IMAGE_TAG}/deploy-bundle.tar.gz"

  deploy-ops:
    name: Remote Ops Deploy via SSM
    runs-on: ubuntu-latest
    environment: production
    needs: package-bundle

    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Execute remote ops deploy command
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          INSTANCE_ID: ${{ vars.AWS_DEPLOY_INSTANCE_ID }}
          DEPLOY_BUCKET: ${{ vars.AWS_DEPLOY_BUCKET }}
          OPS_SSM_PREFIX: ${{ vars.AWS_SSM_OPS_PREFIX }}
          RELEASE_TAG: ${{ needs.package-bundle.outputs.image_tag }}
        run: |
          payload_file="$(mktemp)"

          jq -n \
            --arg instance "$INSTANCE_ID" \
            --arg region "$AWS_REGION" \
            --arg bucket "$DEPLOY_BUCKET" \
            --arg release "$RELEASE_TAG" \
            --arg ops_prefix "$OPS_SSM_PREFIX" \
            '{
              DocumentName: "AWS-RunShellScript",
              InstanceIds: [$instance],
              Parameters: {
                commands: [
                  "set -euo pipefail",
                  "BASE_DIR=\"/opt/platform-ops\"",
                  "RELEASE_DIR=\"$BASE_DIR/releases/\($release)\"",
                  "mkdir -p \"$BASE_DIR/releases\"",
                  "rm -rf \"$RELEASE_DIR\"",
                  "mkdir -p \"$RELEASE_DIR\"",
                  "aws s3 cp \"s3://\($bucket)/releases/\($release)/deploy-bundle.tar.gz\" \"/tmp/platformops-\($release).tar.gz\" --region \($region)",
                  "tar -xzf \"/tmp/platformops-\($release).tar.gz\" -C \"$RELEASE_DIR\"",
                  "cd \"$RELEASE_DIR\"",
                  "chmod +x scripts/prod-deploy-remote.sh",
                  "./scripts/prod-deploy-remote.sh --release-dir \"$RELEASE_DIR\" --region \"\($region)\" --mode ops --ops-ssm-prefix \"\($ops_prefix)\" --release-tag \"\($release)\""
                ]
              }
            }' > "$payload_file"

          command_id="$(aws ssm send-command --cli-input-json "file://${payload_file}" --query 'Command.CommandId' --output text)"

          echo "SSM command id: $command_id"

          max_attempts=180
          sleep_seconds=10
          status=""
          status_details=""
          invocation_available="false"

          for attempt in $(seq 1 "$max_attempts"); do
            set +e
            invocation_json="$(aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --output json 2>&1)"
            rc=$?
            set -e

            if [ "$rc" -ne 0 ]; then
              echo "poll[$attempt/$max_attempts]: invocation not ready yet"
            else
              invocation_available="true"
              status="$(printf '%s' "$invocation_json" | jq -r '.Status')"
              status_details="$(printf '%s' "$invocation_json" | jq -r '.StatusDetails')"
              echo "poll[$attempt/$max_attempts]: status=$status details=$status_details"

              case "$status" in
                Success|Cancelled|TimedOut|Failed|Cancelling)
                  break
                  ;;
              esac
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep "$sleep_seconds"
            fi
          done

          if [ "$invocation_available" != "true" ]; then
            echo "Unable to read SSM command invocation details (command_id=$command_id)" >&2
            exit 1
          fi

          echo "Command status: $status"
          aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query '{Status:Status,StatusDetails:StatusDetails,ResponseCode:ResponseCode,ExecutionStartDateTime:ExecutionStartDateTime,ExecutionEndDateTime:ExecutionEndDateTime,StandardOutputUrl:StandardOutputUrl,StandardErrorUrl:StandardErrorUrl}' --output json || true
          aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text || true
          aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text || true

          if [ "$status" != "Success" ]; then
            echo "Remote ops deployment failed (status=$status, status_details=$status_details)" >&2
            exit 1
          fi
