name: Deploy App From cv-web

on:
  repository_dispatch:
    types: [cv-web-app-release]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-prod
  cancel-in-progress: false

jobs:
  deploy-app:
    name: Remote App Deploy via SSM
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ github.event.client_payload.aws_region || vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Validate payload
        env:
          RELEASE_TAG: ${{ github.event.client_payload.release_tag }}
          API_IMAGE: ${{ github.event.client_payload.api_image }}
          WEB_IMAGE: ${{ github.event.client_payload.web_image }}
        run: |
          required=(RELEASE_TAG API_IMAGE WEB_IMAGE)
          for name in "${required[@]}"; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "Missing repository_dispatch payload field: $name" >&2
              exit 1
            fi
          done

      - name: Execute remote app deploy command
        env:
          AWS_REGION: ${{ github.event.client_payload.aws_region || vars.AWS_REGION }}
          INSTANCE_ID: ${{ vars.AWS_DEPLOY_INSTANCE_ID }}
          DEPLOY_BUCKET: ${{ github.event.client_payload.deploy_bucket || vars.AWS_DEPLOY_BUCKET }}
          APP_SSM_PREFIX: ${{ github.event.client_payload.app_ssm_prefix || vars.AWS_SSM_APP_PREFIX }}
          OPS_SSM_PREFIX: ${{ github.event.client_payload.ops_ssm_prefix || vars.AWS_SSM_OPS_PREFIX }}
          RELEASE_TAG: ${{ github.event.client_payload.release_tag }}
          API_IMAGE: ${{ github.event.client_payload.api_image }}
          WEB_IMAGE: ${{ github.event.client_payload.web_image }}
        run: |
          payload_file="$(mktemp)"

          jq -n \
            --arg instance "$INSTANCE_ID" \
            --arg region "$AWS_REGION" \
            --arg bucket "$DEPLOY_BUCKET" \
            --arg release "$RELEASE_TAG" \
            --arg api_image "$API_IMAGE" \
            --arg web_image "$WEB_IMAGE" \
            --arg app_prefix "$APP_SSM_PREFIX" \
            --arg ops_prefix "$OPS_SSM_PREFIX" \
            '{
              DocumentName: "AWS-RunShellScript",
              InstanceIds: [$instance],
              Parameters: {
                commands: [
                  "set -euo pipefail",
                  "BASE_DIR=\"/opt/cv-web\"",
                  "RELEASE_DIR=\"$BASE_DIR/releases/\($release)\"",
                  "mkdir -p \"$BASE_DIR/releases\"",
                  "rm -rf \"$RELEASE_DIR\"",
                  "mkdir -p \"$RELEASE_DIR\"",
                  "aws s3 cp \"s3://\($bucket)/releases/\($release)/deploy-bundle.tar.gz\" \"/tmp/cvweb-\($release).tar.gz\" --region \($region)",
                  "tar -xzf \"/tmp/cvweb-\($release).tar.gz\" -C \"$RELEASE_DIR\"",
                  "cd \"$RELEASE_DIR\"",
                  "chmod +x scripts/prod-deploy-remote.sh",
                  "./scripts/prod-deploy-remote.sh --release-dir \"$RELEASE_DIR\" --region \"\($region)\" --mode app --app-ssm-prefix \"\($app_prefix)\" --ops-ssm-prefix \"\($ops_prefix)\" --api-image \"\($api_image)\" --web-image \"\($web_image)\" --release-tag \"\($release)\""
                ]
              }
            }' > "$payload_file"

          command_id="$(aws ssm send-command --cli-input-json "file://${payload_file}" --query 'Command.CommandId' --output text)"
          echo "SSM command id: $command_id"

          max_attempts=180
          sleep_seconds=10
          status=""
          status_details=""
          invocation_available="false"

          for attempt in $(seq 1 "$max_attempts"); do
            set +e
            invocation_json="$(aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --output json 2>&1)"
            rc=$?
            set -e

            if [ "$rc" -ne 0 ]; then
              echo "poll[$attempt/$max_attempts]: invocation not ready yet"
            else
              invocation_available="true"
              status="$(printf '%s' "$invocation_json" | jq -r '.Status')"
              status_details="$(printf '%s' "$invocation_json" | jq -r '.StatusDetails')"
              echo "poll[$attempt/$max_attempts]: status=$status details=$status_details"

              case "$status" in
                Success|Cancelled|TimedOut|Failed|Cancelling)
                  break
                  ;;
              esac
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep "$sleep_seconds"
            fi
          done

          if [ "$invocation_available" != "true" ]; then
            echo "Unable to read SSM command invocation details (command_id=$command_id)" >&2
            exit 1
          fi

          echo "Command status: $status"
          aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query '{Status:Status,StatusDetails:StatusDetails,ResponseCode:ResponseCode,ExecutionStartDateTime:ExecutionStartDateTime,ExecutionEndDateTime:ExecutionEndDateTime,StandardOutputUrl:StandardOutputUrl,StandardErrorUrl:StandardErrorUrl}' --output json || true
          aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text || true
          aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text || true

          if [ "$status" != "Success" ]; then
            echo "Remote app deployment failed (status=$status, status_details=$status_details)" >&2
            exit 1
          fi
