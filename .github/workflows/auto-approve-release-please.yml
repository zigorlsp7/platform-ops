name: Auto-Approve and Auto-Merge Release Please PR

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please-auto:
    if: >-
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'release-please--branches--') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Approve Release Please PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.RELEASE_PLEASE_APPROVER_TOKEN }}

      - name: Enable auto-merge for Release Please PR
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.RELEASE_PLEASE_APPROVER_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
