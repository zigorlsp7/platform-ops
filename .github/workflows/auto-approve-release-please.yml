name: Auto-Approve and Auto-Merge Release Please PR

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - CHANGELOG.md
      - .release-please-manifest.json

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve-and-automerge:
    if: startsWith(github.event.pull_request.head.ref, 'release-please--branches--') && github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Auto-approve Release Please PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
